<!DOCTYPE html>
<html lang="en">
<head>
    <title>SS ebookshop</title>
    <script src="main.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 320px;
            padding: 30px;
            background: white;
            border: 2px solid black;
            border-radius: 18px;
        }

        .login-box h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid black;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            border: 2px solid black;
            background: white;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .guest-link {
            color: black;
            text-decoration: underline;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>

        <form action="#">
            <input type="text" name="username" placeholder="Username" />
            <input type="password" name="password" placeholder="Password" />
            <button type="button">Login</button>
        </form>

        <a class="guest-link" href="ssshop">Continue as guest</a>
    </div>
</body>
</html>
